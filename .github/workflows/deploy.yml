name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Add permissions for Workload Identity Federation OIDC token creation
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------------------------------------------
      # 1. Authenticate with Google Cloud
      # -------------------------------------------------------------
      # Set up secrets.GCP_WORKLOAD_IDENTITY_PROVIDER and secrets.GCP_SERVICE_ACCOUNT
      # to use modern, keyless authentication (recommended).
      # Fallback to secrets.GCP_SA_KEY (JSON service account key) if needed.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Set this ONLY if not using Workload Identity Federation

      # -------------------------------------------------------------
      # 2. Set up GCloud CLI and Docker Authentication
      # -------------------------------------------------------------
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      # -------------------------------------------------------------
      # 3. Build & Deploy Backend (FastAPI + Agent + MCP Server)
      # -------------------------------------------------------------
      - name: Build and Push Backend Image
        run: |
          docker build \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/know-way-backend:${{ github.sha }} \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/know-way-backend:latest \
            ./backend

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/know-way-backend:${{ github.sha }}
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/know-way-backend:latest

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: know-way-backend
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/know-way-backend:${{ github.sha }}
          # Grant public accessibility and run as the custom IAM service account with Secret/Vertex access
          flags: --allow-unauthenticated --service-account=know-way-runtime-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          # Inject secrets and configuration
          env_vars: |
            GOOGLE_GENAI_USE_VERTEXAI=1
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=${{ secrets.GCP_REGION }}
            MONGODB_DB_NAME=${{ secrets.MONGODB_DB_NAME }}
            ALLOW_SEED=false
            EXPOSE_OPENAPI=false
            RATE_LIMIT_ENABLED=true
            INSIGHTS_ENABLED=true
          # Safely pull MONGODB_URI and CLERK_JWT_ISSUER from secure secrets manager
          secrets: |
            MONGODB_URI=MONGODB_URI:latest
            CLERK_JWT_ISSUER=CLERK_JWT_ISSUER:latest

      # -------------------------------------------------------------
      # 4. Build & Deploy Frontend (Next.js)
      # -------------------------------------------------------------
      - name: Build and Push Frontend Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }} \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }} \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/know-way-frontend:${{ github.sha }} \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/know-way-frontend:latest \
            ./frontend

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/know-way-frontend:${{ github.sha }}
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/know-way-frontend:latest

      - name: Deploy Frontend to Cloud Run
        id: deploy-frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: know-way-frontend
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/know-way-frontend:${{ github.sha }}
          # Run as the custom IAM service account with Secret access
          flags: --allow-unauthenticated --service-account=know-way-runtime-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          # Next.js Server Side Secrets (like Clerk keys)
          secrets: |
            CLERK_SECRET_KEY=CLERK_SECRET_KEY:latest
